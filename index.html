<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Классика — Музыкальный Атлас</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--parchment:#f5f0e8;--gold:#b8922a;--gold-light:#d4aa4a;
  --muted:#7a6f60;--cream:#faf7f2;--warm:#fffdf9;--border:#d8cfc0;
  --shadow:rgba(26,20,16,0.13);--red:#c0392b;--green:#2e7d52;
  --sidebar-w:270px;
}
.dark{
  --ink:#f0ead8;--parchment:#1e1a14;--cream:#141008;--warm:#1a1510;
  --border:#3a3020;--muted:#9a8f7a;--shadow:rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* HEADER */
header{background:var(--ink);padding:28px 24px 22px;position:relative;overflow:hidden}
.dark header{background:#0d0a06}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 130%,rgba(184,146,42,.2) 0%,transparent 65%)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left{}
.header-ornament{color:var(--gold);font-size:11px;letter-spacing:5px;text-transform:uppercase;font-family:'Tenor Sans',sans-serif;opacity:.7;margin-bottom:6px}
header h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:300;color:var(--parchment);letter-spacing:1px;line-height:1.1}
.dark header h1{color:#f0ead8}
header h1 em{color:var(--gold-light);font-style:italic}
.header-right{display:flex;align-items:center;gap:10px}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(184,146,42,.3);color:var(--gold-light);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.theme-btn:hover{background:rgba(184,146,42,.15)}

/* SEARCH BAR */
.search-wrap{background:var(--parchment);border-bottom:1px solid var(--border);padding:12px 20px;transition:background .3s}
.dark .search-wrap{background:#1a1510}
.search-inner{max-width:1200px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--warm);border:1px solid var(--border);padding:8px 14px}
.dark .search-box{background:#0f0c08}
.search-box input{flex:1;border:none;background:none;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--ink);outline:none}
.search-box input::placeholder{color:var(--muted);font-style:italic}
.search-icon{color:var(--muted);font-size:14px}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all .2s;border-radius:1px}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.random-btn{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--gold);background:none;color:var(--gold);cursor:pointer;transition:all .2s;white-space:nowrap}
.random-btn:hover{background:var(--gold);color:var(--ink)}

/* LAYOUT */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:calc(100vh - 140px)}

/* SIDEBAR */
.sidebar{background:var(--ink);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold) transparent;position:sticky;top:0;height:calc(100vh - 140px)}
.dark .sidebar{background:#0d0a06}
.sidebar-section{padding:16px 0 4px}
.era-label{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(184,146,42,.5);padding:10px 18px 5px}
.composer-btn{display:block;width:100%;background:none;border:none;text-align:left;padding:10px 18px;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.composer-btn:hover{background:rgba(184,146,42,.08);border-left-color:rgba(184,146,42,.3)}
.composer-btn.active{background:rgba(184,146,42,.14);border-left-color:var(--gold)}
.composer-btn .c-name{display:block;font-family:'Cormorant Garamond',serif;font-size:.98rem;color:var(--parchment);letter-spacing:.2px}
.dark .composer-btn .c-name{color:#e8e0cc}
.composer-btn.active .c-name{color:var(--gold-light)}
.composer-btn .c-years{display:block;font-size:.72rem;color:rgba(245,240,232,.3);font-family:'Tenor Sans',sans-serif;margin-top:1px;letter-spacing:.5px}
.composer-btn.hidden{display:none}

/* MAIN */
.main{background:var(--warm);overflow-y:auto;transition:background .3s}
.dark .main{background:#141008}

/* WELCOME / HOME */
.home-page{padding:32px 40px 52px}
.home-hero{background:linear-gradient(135deg,#2a221a,#1a1410);padding:40px 44px;margin-bottom:28px;position:relative;overflow:hidden}
.dark .home-hero{background:linear-gradient(135deg,#0d0a06,#1a1208)}
.home-hero::after{content:'𝄞';position:absolute;right:30px;top:10px;font-size:120px;opacity:.06;color:var(--gold);line-height:1}
.home-hero h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:300;color:var(--parchment);margin-bottom:8px}
.home-hero p{color:rgba(245,240,232,.55);font-size:1rem;line-height:1.7;max-width:520px;font-weight:300}
.section-title{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* BEGINNER TOP */
.top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:36px}
.top-card{background:var(--cream);border:1px solid var(--border);padding:16px 18px;cursor:pointer;transition:all .22s;position:relative}
.dark .top-card{background:#1a1510}
.top-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow)}
.top-num{font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:5px}
.top-work{font-size:.95rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:3px}
.top-composer{font-size:.8rem;color:var(--muted);font-style:italic}
.top-diff{position:absolute;top:12px;right:12px;font-size:10px}

/* TIMELINE */
.timeline-wrap{margin-bottom:36px;overflow-x:auto;padding-bottom:8px}
.timeline{position:relative;height:80px;min-width:700px}
.timeline-line{position:absolute;top:38px;left:0;right:0;height:2px;background:var(--border)}
.tl-dot{position:absolute;top:28px;transform:translateX(-50%);cursor:pointer;text-align:center}
.tl-dot .dot{width:18px;height:18px;border-radius:50%;background:var(--gold);margin:0 auto;border:3px solid var(--warm);transition:all .2s}
.dark .tl-dot .dot{border-color:#141008}
.tl-dot:hover .dot{transform:scale(1.3)}
.tl-dot .dot-label{font-family:'Tenor Sans',sans-serif;font-size:8px;letter-spacing:1px;color:var(--muted);margin-top:5px;white-space:nowrap}
.tl-dot .dot-name{font-size:.72rem;color:var(--gold);white-space:nowrap;margin-bottom:3px}

/* COMPOSER PAGE */
.composer-hero{background:linear-gradient(135deg,#2a221a,#1a1410);padding:40px 44px 32px;position:relative;overflow:hidden}
.dark .composer-hero{background:linear-gradient(135deg,#0d0a06,#1a1208)}
.composer-hero::after{content:'';position:absolute;right:-30px;top:-30px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(184,146,42,.1) 0%,transparent 70%)}
.era-badge{display:inline-block;font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(184,146,42,.4);padding:3px 10px;margin-bottom:12px}
.composer-hero h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;color:var(--parchment);letter-spacing:1px;margin-bottom:4px}
.composer-dates{font-size:.9rem;color:rgba(245,240,232,.4);font-style:italic;margin-bottom:16px;font-family:'Tenor Sans',sans-serif;letter-spacing:.5px}
.composer-bio{font-size:1rem;line-height:1.85;color:rgba(245,240,232,.7);max-width:660px;font-weight:300}
.composer-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
.tag{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(184,146,42,.8);background:rgba(184,146,42,.1);padding:3px 9px;border-radius:1px}

.facts-bar{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--parchment);transition:background .3s}
.dark .facts-bar{background:#1a1510}
.fact-item{padding:16px 24px;border-right:1px solid var(--border);flex:1;min-width:120px}
.fact-label{font-family:'Tenor Sans',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fact-value{font-size:.98rem;color:var(--ink)}

/* WORKS */
.works-wrap{padding:28px 36px 48px}
.works-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.works-header h3{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}
.diff-filter{display:flex;gap:6px}
.diff-btn{font-family:'Tenor Sans',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all .2s}
.diff-btn.active{border-color:var(--gold);color:var(--gold)}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}

/* WORK CARD */
.work-card{background:var(--cream);border:1px solid var(--border);padding:18px 20px;transition:all .22s;position:relative}
.dark .work-card{background:#1a1510}
.work-card:hover{border-color:var(--gold);box-shadow:0 5px 22px var(--shadow);transform:translateY(-2px)}
.work-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--gold);transition:height .22s}
.work-card:hover::before{height:100%}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.work-year{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold)}
.work-fav{background:none;border:none;cursor:pointer;font-size:16px;opacity:.4;transition:opacity .2s;line-height:1}
.work-fav:hover,.work-fav.saved{opacity:1}
.work-fav.saved{color:#e74c3c}
.work-title{font-size:1.02rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:4px}
.work-subtitle{font-size:.82rem;font-style:italic;color:var(--muted);margin-bottom:8px;line-height:1.4}
.diff-stars{font-size:12px;margin-bottom:8px}
.work-desc{font-size:.85rem;line-height:1.6;color:var(--muted);margin-bottom:14px}
.card-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.listen-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid rgba(184,146,42,.4);padding:6px 12px;background:none;cursor:pointer;transition:all .2s}
.listen-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.listened-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:6px 12px;background:none;cursor:pointer;transition:all .2s}
.listened-btn:hover{border-color:var(--green);color:var(--green)}
.listened-btn.done{border-color:var(--green);color:var(--green);background:rgba(46,125,82,.08)}

/* YOUTUBE MODAL */
.yt-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px}
.yt-overlay.open{display:flex}
.yt-modal{background:#0d0a06;border:1px solid rgba(184,146,42,.3);max-width:780px;width:100%;position:relative}
.yt-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(184,146,42,.15)}
.yt-title{font-size:1.05rem;color:#f0ead8;font-weight:400;max-width:85%}
.yt-composer{font-size:.8rem;color:var(--gold);font-family:'Tenor Sans',sans-serif;letter-spacing:1px;margin-top:2px}
.yt-close{background:none;border:none;color:rgba(240,234,216,.5);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;transition:color .2s}
.yt-close:hover{color:#f0ead8}
.yt-frame-wrap{position:relative;padding-bottom:56.25%;height:0}
.yt-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.yt-footer{padding:12px 20px;font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(240,234,216,.3);text-transform:uppercase}

/* SAVED PAGE */
.saved-page{padding:32px 40px}
.saved-empty{text-align:center;padding:60px 20px;color:var(--muted);font-style:italic;font-size:1.1rem}

/* RANDOM MODAL */
.rand-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;padding:20px}
.rand-overlay.open{display:flex}
.rand-modal{background:var(--warm);border:1px solid rgba(184,146,42,.4);max-width:520px;width:100%;padding:36px 40px;position:relative}
.dark .rand-modal{background:#1a1510}
.rand-badge{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.rand-title{font-size:1.6rem;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:4px}
.rand-composer{font-size:1rem;font-style:italic;color:var(--gold);margin-bottom:12px}
.rand-desc{font-size:.9rem;line-height:1.65;color:var(--muted);margin-bottom:20px}
.rand-actions{display:flex;gap:10px;flex-wrap:wrap}
.rand-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--parchment);padding:0 36px;transition:background .3s}
.dark .nav-tabs{background:#1a1510}
.nav-tab{font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:13px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.nav-tab:hover{color:var(--gold)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SEARCH RESULTS */
.search-results{padding:28px 36px}
.search-result-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.search-result-item:hover .sri-title{color:var(--gold)}
.sri-year{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:1px;color:var(--gold);min-width:50px;padding-top:2px}
.sri-body{}
.sri-title{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:2px;transition:color .2s}
.sri-composer{font-size:.82rem;color:var(--muted);font-style:italic}

/* MOBILE */
@media(max-width:680px){
  .app{grid-template-columns:1fr}
  .sidebar{height:auto;position:static;display:flex;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:8px 0}
  .sidebar::-webkit-scrollbar{display:none}
  .era-label{display:none}
  .composer-btn{padding:8px 14px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;min-width:auto}
  .composer-btn.active{border-bottom-color:var(--gold)}
  .sidebar-section{display:flex;padding:0}
  .composer-hero,.works-wrap,.home-page,.saved-page{padding:20px 16px}
  .facts-bar{flex-direction:column}
  .fact-item{border-right:none;border-bottom:1px solid var(--border)}
  .works-grid{grid-template-columns:1fr}
  .nav-tabs{padding:0 12px;overflow-x:auto}
  .search-inner{flex-direction:column}
  .filter-btns{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .top-grid{grid-template-columns:1fr}
  .timeline-wrap{margin:0 -16px 28px;padding:0 16px 8px}
}

.fade-in{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.badge-new{display:inline-block;background:var(--gold);color:var(--ink);font-family:'Tenor Sans',sans-serif;font-size:7px;letter-spacing:1px;padding:1px 5px;vertical-align:middle;margin-left:5px;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="header-ornament">♩ Музыкальный Атлас ♩</div>
      <h1>Великие <em>Классики</em></h1>
    </div>
    <div class="header-right">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Тёмная</button>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Поиск произведения или композитора…" oninput="handleSearch(this.value)">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
      <button class="filter-btn" onclick="setFilter('Барокко',this)">Барокко</button>
      <button class="filter-btn" onclick="setFilter('Классицизм',this)">Классицизм</button>
      <button class="filter-btn" onclick="setFilter('Романтизм',this)">Романтизм</button>
      <button class="filter-btn" onclick="setFilter('Импрессионизм',this)">Импрессионизм</button>
      <button class="filter-btn" onclick="setFilter('XX век',this)">XX век</button>
    </div>
    <button class="random-btn" onclick="showRandom()">🎲 Случайное</button>
  </div>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<!-- YouTube Modal -->
<div class="yt-overlay" id="ytOverlay" onclick="closeYT(event)">
  <div class="yt-modal">
    <div class="yt-header">
      <div>
        <div class="yt-title" id="ytTitle"></div>
        <div class="yt-composer" id="ytComposer"></div>
      </div>
      <button class="yt-close" onclick="closeYTBtn()">✕</button>
    </div>
    <div class="yt-frame-wrap">
      <iframe id="ytFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="yt-footer">YouTube · воспроизведение внутри приложения</div>
  </div>
</div>

<!-- Random Modal -->
<div class="rand-overlay" id="randOverlay" onclick="closeRand(event)">
  <div class="rand-modal">
    <button class="rand-close" onclick="closeRandBtn()">✕</button>
    <div class="rand-badge" id="randBadge"></div>
    <div class="rand-title" id="randTitle"></div>
    <div class="rand-composer" id="randComposer"></div>
    <div class="rand-desc" id="randDesc"></div>
    <div class="rand-actions">
      <button class="listen-btn" id="randListen" onclick="randListen()">▶ Слушать</button>
      <button class="listen-btn" onclick="showRandom()" style="border-color:rgba(184,146,42,.3)">🎲 Ещё раз</button>
      <button class="listen-btn" id="randGoComposer" onclick="randGo()">→ К композитору</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const composers = [
  {
    id:'vivaldi',era:'Барокко',name:'Антонио Вивальди',nameShort:'Вивальди',years:'1678–1741',
    birthplace:'Венеция, Италия',nationality:'Итальянский',
    style:['Концерт','Барокко','Скрипка'],
    bio:'Антонио Вивальди — «Рыжий священник» из Венеции, один из самых плодовитых композиторов барокко. Он написал более 500 концертов — почти половину для скрипки — и создал новый образец жанра, который повлиял на всю европейскую музыку. Бах лично переписывал его концерты, чтобы учиться у них. Вивальди всю жизнь работал в венецианском приюте для девочек-сирот, воспитывая блестящий оркестр. Умер в безвестности и нищете в Вене, а его рукописи были проданы по цене макулатуры. Переоткрыт лишь в XX веке.',

// ===================== STATE =====================
let currentComposer = null;
let currentFilter = 'all';
let currentDiffFilter = 'all';
let savedWorks = JSON.parse(localStorage.getItem('savedWorks') || '{}');
let listenedWorks = JSON.parse(localStorage.getItem('listenedWorks') || '{}');
let currentRandWork = null;
let isDark = localStorage.getItem('theme') === 'dark';
let currentTab = 'works';

if (isDark) { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '☀️ Светлая'; }

// ===================== THEME =====================
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '☀️ Светлая' : '🌙 Тёмная';
}

// ===================== FILTER =====================
function setFilter(era, btn) {
  currentFilter = era;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSidebar();
  if (currentComposer) {
    const found = composers.find(c => c.id === currentComposer.id &&
      (era === 'all' || c.era.includes(era)));
    if (!found) { showHome(); currentComposer = null; }
  }
  document.getElementById('searchInput').value = '';
}

// ===================== SEARCH =====================
function handleSearch(val) {
  if (!val.trim()) { if (currentComposer) showComposerPage(currentComposer.id); else showHome(); return; }
  showSearchResults(val.trim());
}

function showSearchResults(q) {
  const ql = q.toLowerCase();
  const results = [];
  composers.forEach(c => {
    if (c.name.toLowerCase().includes(ql)) {
      results.push({type:'composer', c, title:c.name, sub:'Композитор · ' + c.era});
    }
    c.works.forEach((w, wi) => {
      if (w.title.toLowerCase().includes(ql) || w.subtitle.toLowerCase().includes(ql)) {
        results.push({type:'work', c, w, wi, title:w.title, sub:c.nameShort + ' · ' + w.year});
      }
    });
  });

  const main = document.getElementById('main');
  if (!results.length) { main.innerHTML = `<div class="search-results fade-in"><p style="color:var(--muted);font-style:italic;padding:40px 0">Ничего не найдено</p></div>`; return; }
  main.innerHTML = `<div class="search-results fade-in">
    <div class="section-title">Результаты поиска: ${results.length}</div>
    ${results.map(r => `
      <div class="search-result-item" onclick="${r.type==='composer' ? `showComposerPage('${r.c.id}')` : `showComposerPage('${r.c.id}');setTimeout(()=>openYT('${r.w.ytId}','${esc(r.w.title)}','${esc(r.c.name)}'),400)`}">
        <div class="sri-year">${r.type==='composer' ? r.c.years.split('–')[0] : r.w.year}</div>
        <div class="sri-body">
          <div class="sri-title">${r.title}</div>
          <div class="sri-composer">${r.sub}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

// ===================== SIDEBAR =====================
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const seenEra = [];
  let html = '';
  composers.forEach(c => {
    if (currentFilter !== 'all' && !c.era.includes(currentFilter)) return;
    if (!seenEra.includes(c.era)) {
      seenEra.push(c.era);
      if (seenEra.length > 1) html += '</div>';
      html += `<div class="sidebar-section"><div class="era-label">${c.era}</div>`;
    }
    const active = currentComposer && currentComposer.id === c.id ? 'active' : '';
    html += `<button class="composer-btn ${active}" onclick="showComposerPage('${c.id}')" id="btn-${c.id}">
      <span class="c-name">${c.nameShort}</span>
      <span class="c-years">${c.years}</span>
    </button>`;
  });
  if (seenEra.length) html += '</div>';

  // Add Home button at top
  sb.innerHTML = `<div class="sidebar-section" style="border-bottom:1px solid rgba(184,146,42,.15);margin-bottom:4px">
    <button class="composer-btn ${!currentComposer ? 'active' : ''}" onclick="showHome()" id="btn-home">
      <span class="c-name" style="color:var(--gold-light)">🏠 Главная</span>
      <span class="c-years">Топ-10 · Timeline</span>
    </button>
    <button class="composer-btn" onclick="showSaved()">
      <span class="c-name">❤️ Избранное</span>
      <span class="c-years">${Object.keys(savedWorks).length} сохранено</span>
    </button>
  </div>` + html;
}

// ===================== HOME PAGE =====================
function showHome() {
  currentComposer = null;
  buildSidebar();
  document.getElementById('searchInput').value = '';

  const topHtml = beginnerTop.map((t, i) => {
    const c = composers.find(x => x.id === t.cid);
    const w = c.works[t.wi];
    const stars = diffStars(w.diff);
    return `<div class="top-card" onclick="showComposerPage('${c.id}');setTimeout(()=>openYT('${w.ytId}','${esc(w.title)}','${esc(c.name)}'),400)">
      <div class="top-num">№${i+1}</div>
      <div class="top-work">${w.title}</div>
      <div class="top-composer">${c.nameShort} · ${w.year}</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:4px;font-style:italic">${t.reason}</div>
      <div class="top-diff" title="Сложность">${stars}</div>
    </div>`;
  }).join('');

  // Timeline
  const minYear = 1675, maxYear = 1975;
  const tlItems = composers.map(c => {
    const y = parseInt(c.years);
    const pct = ((y - minYear) / (maxYear - minYear) * 100).toFixed(1);
    return `<div class="tl-dot" style="left:${pct}%" onclick="showComposerPage('${c.id}')" title="${c.name} (${c.years})">
      <div class="dot-name">${c.nameShort.split(' ').pop()}</div>
      <div class="dot"></div>
      <div class="dot-label">${y}</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `<div class="home-page fade-in">
    <div class="home-hero">
      <h2>Добро пожаловать в Музыкальный Атлас</h2>
      <p>Изучайте великих классиков — биографии, эпохи, история произведений. Слушайте прямо здесь, не выходя из приложения.</p>
    </div>

    <div class="section-title">С чего начать · Топ-10 для знакомства с классикой</div>
    <div class="top-grid">${topHtml}</div>

    <div class="section-title">Временная шкала · ${composers.length} композиторов</div>
    <div class="timeline-wrap">
      <div class="timeline">
        <div class="timeline-line"></div>
        ${tlItems}
      </div>
    </div>
  </div>`;
}

// ===================== SAVED PAGE =====================
function showSaved() {
  currentComposer = null;
  buildSidebar();
  const keys = Object.keys(savedWorks);
  let html = '';
  if (!keys.length) {
    html = `<div class="saved-empty">Нет сохранённых произведений.<br>Нажмите ❤ на карточке, чтобы добавить в избранное.</div>`;
  } else {
    html = '<div class="works-grid">' + keys.map(k => {
      const [cid, wi] = k.split(':');
      const c = composers.find(x => x.id === cid);
      if (!c) return '';
      const w = c.works[+wi];
      return workCardHtml(c, w, +wi);
    }).join('') + '</div>';
  }
  document.getElementById('main').innerHTML = `<div class="works-wrap fade-in">
    <div class="works-header">
      <h3>Избранное · ${keys.length} произведений</h3>
    </div>
    ${html}
  </div>`;
}

// ===================== COMPOSER PAGE =====================
function showComposerPage(id) {
  const c = composers.find(x => x.id === id);
  if (!c) return;
  currentComposer = c;
  currentTab = 'works';
  currentDiffFilter = 'all';
  buildSidebar();
  document.getElementById('searchInput').value = '';
  renderComposerPage(c);
}

function renderComposerPage(c) {
  const tagsHtml = c.style.map(s => `<span class="tag">${s}</span>`).join('');
  const factsHtml = Object.entries(c.facts).map(([k,v]) =>
    `<div class="fact-item"><div class="fact-label">${k}</div><div class="fact-value">${v}</div></div>`).join('');

  document.getElementById('main').innerHTML = `<div class="fade-in">
    <div class="composer-hero">
      <div class="era-badge">${c.era}</div>
      <h2>${c.name}</h2>
      <div class="composer-dates">${c.years} · ${c.birthplace}</div>
      <p class="composer-bio">${c.bio}</p>
      <div class="composer-tags">${tagsHtml}</div>
    </div>
    <div class="facts-bar">${factsHtml}</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('works',this)">Произведения</button>
      <button class="nav-tab" onclick="switchTab('bio',this)">Биография</button>
    </div>
    <div id="tabContent"></div>
  </div>`;

  renderWorksTab(c);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'works') renderWorksTab(currentComposer);
  else renderBioTab(currentComposer);
}

function renderWorksTab(c) {
  const filtered = currentDiffFilter === 'all' ? c.works :
    c.works.filter(w => w.diff === +currentDiffFilter);

  const worksHtml = filtered.map((w, wi) => workCardHtml(c, w, c.works.indexOf(w))).join('');

  document.getElementById('tabContent').innerHTML = `<div class="works-wrap">
    <div class="works-header">
      <h3>Произведения · ${filtered.length}</h3>
      <div class="diff-filter">
        <button class="diff-btn ${currentDiffFilter==='all'?'active':''}" onclick="setDiffFilter('all',this)">Все</button>
        <button class="diff-btn ${currentDiffFilter==='1'?'active':''}" onclick="setDiffFilter('1',this)">⭐ Лёгкие</button>
        <button class="diff-btn ${currentDiffFilter==='2'?'active':''}" onclick="setDiffFilter('2',this)">⭐⭐ Средние</button>
        <button class="diff-btn ${currentDiffFilter==='3'?'active':''}" onclick="setDiffFilter('3',this)">⭐⭐⭐ Сложные</button>
      </div>
    </div>
    <div class="works-grid">${worksHtml}</div>
  </div>`;
}

function renderBioTab(c) {
  document.getElementById('tabContent').innerHTML = `<div class="works-wrap">
    <p style="font-size:1.1rem;line-height:2;color:var(--ink);max-width:680px">${c.bio}</p>
    <div style="margin-top:28px;font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)">Направление</div>
    <div class="composer-tags" style="margin-top:8px">${c.style.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
  </div>`;
}

function setDiffFilter(d, btn) {
  currentDiffFilter = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWorksTab(currentComposer);
}

// ===================== WORK CARD =====================
function workCardHtml(c, w, wi) {
  const key = c.id + ':' + wi;
  const isSaved = !!savedWorks[key];
  const isDone = !!listenedWorks[key];
  return `<div class="work-card">
    <div class="card-top">
      <div class="work-year">${w.year} · ${w.genre}</div>
      <button class="work-fav ${isSaved?'saved':''}" onclick="toggleSave('${c.id}',${wi})" title="В избранное">❤</button>
    </div>
    <div class="work-title">${w.title}</div>
    <div class="work-subtitle">${w.subtitle}</div>
    <div class="diff-stars">${diffStars(w.diff)}</div>
    <div class="work-desc">${w.desc}</div>
    <div class="card-actions">
      <button class="listen-btn" onclick="openYT('${w.ytId}','${esc(w.title)}','${esc(c.name)}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Слушать
      </button>
      <button class="listened-btn ${isDone?'done':''}" onclick="toggleListened('${c.id}',${wi})" id="ld-${c.id}-${wi}">
        ${isDone ? '✓ Прослушано' : '○ Отметить'}
      </button>
    </div>
  </div>`;
}

function diffStars(d) {
  if (d === 1) return '<span style="color:var(--gold)">⭐</span><span style="opacity:.25">⭐⭐</span> <span style="font-size:.72rem;color:var(--muted);font-family:Tenor Sans,sans-serif">Для начинающих</span>';
  if (d === 2) return '<span style="color:var(--gold)">⭐⭐</span><span style="opacity:.25">⭐</span> <span style="font-size:.72rem;color:var(--muted);font-family:Tenor Sans,sans-serif">Средний уровень</span>';
  return '<span style="color:var(--gold)">⭐⭐⭐</span> <span style="font-size:.72rem;color:var(--muted);font-family:Tenor Sans,sans-serif">Для подготовленных</span>';
}

function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ===================== SAVE / LISTENED =====================
function toggleSave(cid, wi) {
  const key = cid + ':' + wi;
  if (savedWorks[key]) delete savedWorks[key]; else savedWorks[key] = true;
  localStorage.setItem('savedWorks', JSON.stringify(savedWorks));
  // refresh fav buttons
  document.querySelectorAll('.work-fav').forEach((btn, i) => {
    // re-render card would be nicer but quick toggle:
  });
  if (currentTab === 'works' && currentComposer) renderWorksTab(currentComposer);
  buildSidebar();
}

function toggleListened(cid, wi) {
  const key = cid + ':' + wi;
  if (listenedWorks[key]) delete listenedWorks[key]; else listenedWorks[key] = true;
  localStorage.setItem('listenedWorks', JSON.stringify(listenedWorks));
  const btn = document.getElementById('ld-' + cid + '-' + wi);
  if (btn) {
    btn.classList.toggle('done', !!listenedWorks[key]);
    btn.textContent = listenedWorks[key] ? '✓ Прослушано' : '○ Отметить';
  }
}

// ===================== YOUTUBE =====================
function openYT(ytId, title, composer) {
  document.getElementById('ytTitle').textContent = title;
  document.getElementById('ytComposer').textContent = composer;
  document.getElementById('ytFrame').src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
  document.getElementById('ytOverlay').classList.add('open');
}
function closeYT(e) { if (e.target === document.getElementById('ytOverlay')) closeYTBtn(); }
function closeYTBtn() {
  document.getElementById('ytOverlay').classList.remove('open');
  document.getElementById('ytFrame').src = '';
}

// ===================== RANDOM =====================
function showRandom() {
  const allWorks = [];
  composers.forEach(c => c.works.forEach((w, wi) => allWorks.push({c, w, wi})));
  const r = allWorks[Math.floor(Math.random() * allWorks.length)];
  currentRandWork = r;
  document.getElementById('randBadge').textContent = r.c.era + ' · ' + r.w.year;
  document.getElementById('randTitle').textContent = r.w.title;
  document.getElementById('randComposer').textContent = r.c.name + ' · ' + r.w.subtitle;
  document.getElementById('randDesc').textContent = r.w.desc;
  document.getElementById('randOverlay').classList.add('open');
}
function closeRand(e) { if (e.target === document.getElementById('randOverlay')) closeRandBtn(); }
function closeRandBtn() { document.getElementById('randOverlay').classList.remove('open'); }
function randListen() { closeRandBtn(); openYT(currentRandWork.w.ytId, currentRandWork.w.title, currentRandWork.c.name); }
function randGo() { closeRandBtn(); showComposerPage(currentRandWork.c.id); }

// ===================== INIT =====================
buildSidebar();
showHome();
</script>
</body>
</html>
